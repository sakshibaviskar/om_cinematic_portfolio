<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Videos | OM_CINEMATIC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050505;--bg2:#111111;--gold:#D4AF37;--white:#FFFFFF;--gray:#A5A5A5;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--white);font-family:'Poppins',sans-serif;}
  .wrap{padding:92px 6vw 56px;max-width:1200px;margin:0 auto;}
  .eyebrow{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,80px);letter-spacing:.02em;line-height:1;margin:18px 0 14px;}
  .sub{color:var(--gray);max-width:56ch;line-height:1.8;}
  .topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:26px;}
  .back{display:inline-block;text-decoration:none;color:var(--white);border:1px solid rgba(255,255,255,.2);padding:12px 18px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;transition:.35s;}
  .back:hover{border-color:var(--gold);color:var(--gold);}
  .video-grid{display:grid;grid-template-columns:repeat(3,minmax(170px,220px));justify-content:center;gap:14px;}
  @media(max-width:900px){.video-grid{grid-template-columns:repeat(2,minmax(170px,220px));}}
  @media(max-width:560px){.video-grid{grid-template-columns:minmax(170px,220px);}}
  .video-card{border:1px solid rgba(255,255,255,.1);background:var(--bg2);overflow:hidden;}
  .video-frame{aspect-ratio:9/16;background:#000;max-height:390px;}
  .video-frame iframe,.video-frame video,.video-frame img{width:100%;height:100%;border:0;display:block;object-fit:cover;}
  .meta{padding:10px 10px 12px;}
  .meta h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;}
  .meta p{color:var(--gray);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-top:4px;}
</style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div>
        <div class="eyebrow">Portfolio Category</div>
        <h1>Beauty Videos</h1>
        <p class="sub">Cinematic beauty stories with soft lighting, polished motion, and product-focused framing.</p>
      </div>
      <a class="back" href="om_cinematic_portfolio_v1.html#portfolio">Back To Portfolio</a>
    </div>

    <section class="video-grid">
      <article class="video-card"><div class="video-frame"><video controls autoplay muted loop preload="metadata" playsinline><source src="https://res.cloudinary.com/abzyolhu/video/upload/v1782926807/beauty1_pngubx.mov">Your browser does not support this video format.</video></div><div class="meta"><h3>Beauty Brand Launch</h3></div></article>
      <article class="video-card"><div class="video-frame"><video controls autoplay muted loop preload="metadata" playsinline><source src="https://res.cloudinary.com/abzyolhu/video/upload/v1782929423/beauty2_pc9yec.mp4" type="video/mp4">Your browser does not support this video format.</video></div><div class="meta"><h3>Makeup Reel</h3></div></article>
      <article class="video-card"><div class="video-frame"><img src="beauty.jpeg" alt="Glow Product Showcase thumbnail"></div><div class="meta"><h3>Glow Product Showcase</h3></div></article>
    </section>
  </main>
</body>
</html>
